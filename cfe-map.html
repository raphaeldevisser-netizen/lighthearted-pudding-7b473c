<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFE — 150 Years of Construction Heritage</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1B2A4A;
  --navy-mid:#243558;
  --white:#FFFFFF;
  --off-white:#F7F8FA;
  --light:#ECEEF2;
  --border:rgba(27,42,74,0.1);
  --text:#1B2A4A;
  --muted:#6B7A99;
  --green:#4BC88A;
  --cyan:#3BBFCE;
  --blue:#4B7BEC;
  --purple:#7B5EA7;
  --accent:var(--green);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:Poppins,sans-serif;background:var(--off-white);color:var(--text);overflow:hidden;}

#header{
  position:fixed;top:0;left:0;right:0;z-index:1000;height:60px;
  background:var(--white);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 28px;
  box-shadow:0 2px 16px rgba(27,42,74,0.07);
}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.logo-hex{width:36px;height:36px;flex-shrink:0;}
.logo-name{font-size:20px;font-weight:700;color:var(--navy);letter-spacing:-0.5px;line-height:1;}
.logo-tag{font-size:9px;font-weight:500;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;}
.logo-sep{width:1px;height:28px;background:var(--border);margin:0 4px;}
.logo-section{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.header-right{display:flex;align-items:center;gap:20px;}
#project-count{font-size:12px;color:var(--muted);}
#project-count strong{color:var(--navy);font-weight:700;}
.btn-submit{
  background:var(--navy);color:var(--white);border:none;
  padding:9px 18px;font-family:Poppins,sans-serif;
  font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;
  cursor:pointer;transition:background 0.2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;
}
.btn-submit:hover{background:var(--navy-mid);}

#map-wrapper{position:fixed;top:60px;left:0;right:0;bottom:48px;}
#map{width:100%;height:100%;}

#filters{
  position:fixed;top:76px;left:20px;z-index:100;
  background:var(--white);border:1px solid var(--border);
  padding:18px;width:220px;
  box-shadow:0 8px 32px rgba(27,42,74,0.1);
}
.filter-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.filter-icon{width:6px;height:6px;background:var(--green);border-radius:50%;}
.filter-title{font-size:10px;letter-spacing:2px;color:var(--navy);text-transform:uppercase;font-weight:700;}
.filter-group{margin-bottom:14px;}
.filter-label{font-size:10px;color:var(--muted);margin-bottom:7px;letter-spacing:0.8px;text-transform:uppercase;font-weight:600;}
.filter-chips{display:flex;flex-wrap:wrap;gap:4px;}
.chip{
  font-size:10px;padding:4px 10px;border:1.5px solid var(--border);
  cursor:pointer;transition:all 0.15s;color:var(--muted);
  background:var(--off-white);font-weight:500;border-radius:2px;
}
.chip.active{background:var(--navy);color:var(--white);border-color:var(--navy);}
.chip:hover:not(.active){border-color:var(--navy);color:var(--navy);background:var(--white);}
input[type=range]{-webkit-appearance:none;width:100%;height:2px;background:var(--light);outline:none;margin:8px 0;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--navy);cursor:pointer;border-radius:50%;}
.range-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-weight:500;}

#popup-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(27,42,74,0.5);
  z-index:2000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);
}
#popup-overlay.open{display:flex;}
#popup{
  background:var(--white);width:580px;max-width:95vw;max-height:88vh;
  overflow-y:auto;position:relative;box-shadow:0 32px 80px rgba(27,42,74,0.25);
}
.popup-photos{
  width:100%;height:220px;background:var(--light);position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--muted);
}
.popup-photos img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;}
.popup-tag{
  position:absolute;bottom:14px;left:14px;
  font-size:9px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;padding:5px 12px;
}
.popup-close{
  position:absolute;top:14px;right:14px;width:32px;height:32px;
  background:rgba(255,255,255,0.9);border:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--navy);font-size:14px;transition:all 0.15s;z-index:10;
}
.popup-close:hover{background:var(--navy);color:var(--white);}
.popup-body{padding:28px 32px;}
.popup-year{font-size:10px;letter-spacing:2px;color:var(--green);text-transform:uppercase;font-weight:700;margin-bottom:8px;}
.popup-name{font-size:26px;font-weight:800;line-height:1.15;margin-bottom:20px;color:var(--navy);letter-spacing:-0.5px;}
.popup-divider{height:1px;background:var(--border);margin:18px 0;}
.popup-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.popup-field label{font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;font-weight:700;display:block;margin-bottom:4px;}
.popup-field p{font-size:13px;color:var(--navy);font-weight:400;}
.popup-desc{font-size:13px;color:var(--muted);line-height:1.75;margin-top:4px;}

#stats-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;height:48px;
  background:var(--navy);display:flex;align-items:center;justify-content:center;gap:48px;
}
.stat{display:flex;align-items:center;gap:10px;}
.stat-num{font-size:20px;font-weight:800;color:var(--white);}
.stat-label{font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,0.45);text-transform:uppercase;font-weight:600;}
.stat-divider{width:1px;height:20px;background:rgba(255,255,255,0.1);}

#loading{
  position:fixed;top:0;left:0;right:0;bottom:0;background:var(--navy);z-index:9999;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;transition:opacity 0.4s;
}
.loading-logo-wrap{display:flex;align-items:center;gap:14px;}
.loading-hex{width:48px;height:48px;}
.loading-name{font-size:36px;font-weight:800;color:var(--white);letter-spacing:-1px;}
.loading-line{width:200px;height:2px;background:rgba(255,255,255,0.15);position:relative;overflow:hidden;}
.loading-progress{height:100%;background:var(--green);animation:load 1.8s ease forwards;}
@keyframes load{from{width:0}to{width:100%}}
.loading-sub{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.4);text-transform:uppercase;font-weight:500;}
</style>
</head>
<body>

<div id="loading">
  <img src="https://companieslogo.com/img/orig/CFEB.BR_BIG.D-d0bf4cce.png?t=1721672046" alt="CFE" style="height:48px;width:auto;">
  <div class="loading-line"><div class="loading-progress"></div></div>
  <div class="loading-sub">150 Years of Construction Heritage</div>
</div>

<div id="header">
  <div class="logo">
    <img src="https://companieslogo.com/img/orig/CFEB.BR_BIG-47b721cd.png?t=1721672046" alt="CFE" style="height:32px;width:auto;display:block;">
    <div class="logo-sep"></div>
    <div class="logo-section">Heritage Map</div>
  </div>
  <div class="header-right">
    <div id="project-count">Showing <strong id="visible-count">0</strong> of <strong id="total-count">0</strong> projects</div>
    <a href="cfe-submit.html" class="btn-submit">+ Submit a Project</a>
  </div>
</div>

<div id="map-wrapper"><div id="map"></div></div>

<div id="filters">
  <div class="filter-header"><div class="filter-icon"></div><div class="filter-title">Filter Projects</div></div>
  <div class="filter-group">
    <div class="filter-label">Type of Works</div>
    <div class="filter-chips" id="type-filters">
      <div class="chip active" data-type="all">All</div>
      <div class="chip" data-type="Civil Engineering">Civil</div>
      <div class="chip" data-type="Building Construction">Buildings</div>
      <div class="chip" data-type="Infrastructure">Infrastructure</div>
      <div class="chip" data-type="Industrial">Industrial</div>
      <div class="chip" data-type="Marine">Marine</div>
      <div class="chip" data-type="Energy">Energy</div>
    </div>
  </div>
  <div class="filter-group">
    <div class="filter-label">Decade: <span id="year-display">All Years</span></div>
    <input type="range" id="year-range" min="1875" max="2025" value="1875" step="10">
    <div class="range-labels"><span>1875</span><span>2025</span></div>
  </div>
</div>

<div id="popup-overlay">
  <div id="popup">
    <div class="popup-photos" id="popup-photos">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="opacity:0.3"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
      <span style="font-size:11px;font-weight:500;">No photos submitted</span>
    </div>
    <div class="popup-tag" id="popup-tag"></div>
    <button class="popup-close" id="popup-close-btn">&#10005;</button>
    <div class="popup-body">
      <div class="popup-year" id="popup-year"></div>
      <div class="popup-name" id="popup-name"></div>
      <div class="popup-divider"></div>
      <div class="popup-grid">
        <div class="popup-field"><label>Location</label><p id="popup-location"></p></div>
        <div class="popup-field"><label>Submitted by</label><p id="popup-submitted"></p></div>
        <div class="popup-field"><label>Company</label><p id="popup-company"></p></div>
        <div class="popup-field"><label>Year Delivered</label><p id="popup-delivered"></p></div>
      </div>
      <div class="popup-divider"></div>
      <div class="popup-field"><label>Works Description</label><p class="popup-desc" id="popup-works"></p></div>
    </div>
  </div>
</div>

<div id="stats-bar">
  <div class="stat"><div class="stat-num" id="stat-projects">0</div><div class="stat-label">Projects</div></div>
  <div class="stat-divider"></div>
  <div class="stat"><div class="stat-num" id="stat-countries">0</div><div class="stat-label">Countries</div></div>
  <div class="stat-divider"></div>
  <div class="stat"><div class="stat-num">150</div><div class="stat-label">Years Heritage</div></div>
  <div class="stat-divider"></div>
  <div class="stat"><div class="stat-num" id="stat-types">0</div><div class="stat-label">Project Types</div></div>
</div>

<script>
(function(){
'use strict';
var MAPS_KEY   = 'AIzaSyC7lh812kiuuekwH2hT1vaRmQbwbznOJGI';
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby9iTkjOeH0Zl1ETbdMBPTm0k4cfAbw7JI4OCA3LxlxzvZgag9jo1e5oIV_swt0G_GNWQ/exec';

var map, markers=[], allProjects=[], activeType='all', activeYear=1875;
var TYPE_COLORS={
  'Civil Engineering':'#4BC88A',
  'Building Construction':'#3BBFCE',
  'Infrastructure':'#4B7BEC',
  'Industrial':'#F4A623',
  'Marine':'#1B2A4A',
  'Energy':'#7B5EA7',
  'Other':'#6B7A99'
};
var TYPE_BG={
  'Civil Engineering':'#4BC88A',
  'Building Construction':'#3BBFCE',
  'Infrastructure':'#4B7BEC',
  'Industrial':'#F4A623',
  'Marine':'#1B2A4A',
  'Energy':'#7B5EA7',
  'Other':'#6B7A99'
};

var DEMO=[
  {name:'Port of Antwerp Extension',lat:'51.2194',lng:'4.4025',type:'Marine',year:'1923',company:'CFE',location_name:'Antwerp, Belgium',name_contact:'Heritage Team',works:'Construction of quay walls and port infrastructure.',photos:'',status:'approved',country:'Belgium'},
  {name:'Brussels Metro Line 1',lat:'50.8503',lng:'4.3517',type:'Civil Engineering',year:'1976',company:'CFE',location_name:'Brussels, Belgium',name_contact:'Heritage Team',works:'Tunnelling and station construction for urban metro system.',photos:'',status:'approved',country:'Belgium'},
  {name:'Atomium Foundations',lat:'50.8946',lng:'4.3411',type:'Building Construction',year:'1958',company:'CFE',location_name:'Brussels, Belgium',name_contact:'Heritage Team',works:'Foundation works and structural support for the Atomium.',photos:'',status:'approved',country:'Belgium'},
  {name:'Eurotunnel Service Works',lat:'51.0901',lng:'1.7800',type:'Infrastructure',year:'1994',company:'CFE',location_name:'Calais, France',name_contact:'Heritage Team',works:'Ancillary construction works for the Channel Tunnel.',photos:'',status:'approved',country:'France'},
  {name:'Luxembourg Station Quarter',lat:'49.6116',lng:'6.1319',type:'Building Construction',year:'2003',company:'CFE',location_name:'Luxembourg City',name_contact:'Heritage Team',works:'Mixed-use development including offices and retail.',photos:'',status:'approved',country:'Luxembourg'},
  {name:'Rotterdam Container Terminal',lat:'51.9225',lng:'4.4792',type:'Industrial',year:'1987',company:'CFE',location_name:'Rotterdam, Netherlands',name_contact:'Heritage Team',works:'Civil works for container terminal expansion.',photos:'',status:'approved',country:'Netherlands'},
  {name:'Kinshasa Highway N1',lat:'-4.3217',lng:'15.3222',type:'Infrastructure',year:'1972',company:'CFE',location_name:'Kinshasa, DRC',name_contact:'Heritage Team',works:'Road construction and bridge works.',photos:'',status:'approved',country:'DRC'},
  {name:'Abu Dhabi Coastal Road',lat:'24.4539',lng:'54.3773',type:'Civil Engineering',year:'2008',company:'CFE',location_name:'Abu Dhabi, UAE',name_contact:'Heritage Team',works:'Coastal road reclamation and infrastructure works.',photos:'',status:'approved',country:'UAE'},
  {name:'Casablanca Tramway',lat:'33.5731',lng:'-7.5898',type:'Infrastructure',year:'2012',company:'CFE',location_name:'Casablanca, Morocco',name_contact:'Heritage Team',works:'Civil engineering works for urban tramway Line 1.',photos:'',status:'approved',country:'Morocco'},
  {name:'Singapore Marina Works',lat:'1.2840',lng:'103.8607',type:'Marine',year:'1995',company:'CFE',location_name:'Singapore',name_contact:'Heritage Team',works:'Piling and marine foundation works.',photos:'',status:'approved',country:'Singapore'}
];

var _pendingProjects=null;

(function(){
  var cb='_d'+Date.now();
  var el=document.createElement('script');
  var t=setTimeout(function(){done(DEMO);},8000);
  window[cb]=function(data){
    clearTimeout(t);
    var all=(data&&Array.isArray(data.projects))?data.projects:[];
    var ok=all.filter(function(p){return String(p.status).toLowerCase().trim()==='approved';});
    done(ok.length>0?ok:DEMO);
  };
  el.onerror=function(){clearTimeout(t);done(DEMO);};
  el.src=SCRIPT_URL+'?action=list&callback='+cb+'&t='+Date.now();
  document.head.appendChild(el);
  function done(projects){
    delete window[cb];
    _pendingProjects=projects;
    if(map) showProjects(projects);
  }
})();

window.gm_authFailure=function(){
  document.getElementById('map').innerHTML='<div style="padding:40px;color:#1B2A4A;font-family:Poppins,sans-serif;">Google Maps auth failure — check API key.</div>';
};

window.initMap=function(){
  var h=window.innerHeight-60-48;
  var wrapper=document.getElementById('map-wrapper');
  var mapEl=document.getElementById('map');
  wrapper.style.cssText='position:fixed;top:60px;left:0;right:0;bottom:48px;width:100%;height:'+h+'px;';
  mapEl.style.cssText='width:100%;height:'+h+'px;';

  map=new google.maps.Map(mapEl,{
    center:{lat:20,lng:15},zoom:2,minZoom:2,
    mapTypeControl:false,streetViewControl:false,fullscreenControl:false,
    styles:[
      {elementType:'geometry',stylers:[{color:'#EEF0F5'}]},
      {elementType:'labels.text.fill',stylers:[{color:'#6B7A99'}]},
      {elementType:'labels.text.stroke',stylers:[{color:'#FFFFFF'}]},
      {featureType:'water',elementType:'geometry',stylers:[{color:'#C8D8EC'}]},
      {featureType:'road',stylers:[{visibility:'off'}]},
      {featureType:'poi',stylers:[{visibility:'off'}]},
      {featureType:'transit',stylers:[{visibility:'off'}]},
      {featureType:'landscape',elementType:'geometry',stylers:[{color:'#EEF0F5'}]},
      {featureType:'administrative',elementType:'geometry.stroke',stylers:[{color:'#D0D4E0'}]},
      {featureType:'administrative.country',elementType:'geometry.stroke',stylers:[{color:'#B0B8CC'}]},
      {featureType:'administrative.country',elementType:'labels.text.fill',stylers:[{color:'#6B7A99'}]}
    ]
  });

  if(_pendingProjects!==null) showProjects(_pendingProjects);

  setTimeout(function(){
    var l=document.getElementById('loading');
    l.style.opacity='0';
    setTimeout(function(){l.style.display='none';},400);
  },1500);
};

function showProjects(projects){
  allProjects=projects;
  renderMarkers(projects);
  updateStats(projects);
}

function renderMarkers(projects){
  markers.forEach(function(m){m.setMap(null);});
  markers=[];
  projects.forEach(function(p){
    var lat=parseFloat(p.lat),lng=parseFloat(p.lng);
    if(isNaN(lat)||isNaN(lng)) return;
    var color=TYPE_COLORS[p.type]||TYPE_COLORS['Other'];
    var m=new google.maps.Marker({
      position:{lat:lat,lng:lng},map:map,title:p.name,
      icon:{path:google.maps.SymbolPath.CIRCLE,fillColor:color,fillOpacity:1,strokeColor:'#FFFFFF',strokeWeight:2,scale:8}
    });
    m.addListener('click',function(){openPopup(p);});
    markers.push(m);
  });
  document.getElementById('visible-count').textContent=markers.length;
}

function updateStats(projects){
  document.getElementById('stat-projects').textContent=projects.length;
  document.getElementById('total-count').textContent=projects.length;
  document.getElementById('stat-countries').textContent=new Set(projects.map(function(p){return p.country;}).filter(Boolean)).size||0;
  document.getElementById('stat-types').textContent=new Set(projects.map(function(p){return p.type;}).filter(Boolean)).size||0;
}

function openPopup(p){
  document.getElementById('popup-year').textContent=p.year||'';
  document.getElementById('popup-name').textContent=p.name||'';
  document.getElementById('popup-location').textContent=p.location_name||'—';
  document.getElementById('popup-submitted').textContent=p.name_contact||'—';
  document.getElementById('popup-company').textContent=p.company||'—';
  document.getElementById('popup-delivered').textContent=p.year||'—';
  document.getElementById('popup-works').textContent=p.works||'No description provided.';
  var tag=document.getElementById('popup-tag');
  tag.textContent=p.type||'';
  tag.style.background=TYPE_BG[p.type]||TYPE_BG['Other'];
  tag.style.color=p.type==='Industrial'?'#1B2A4A':'#FFFFFF';
  var photoList=p.photos?p.photos.split('|').filter(Boolean):[];
  document.getElementById('popup-photos').innerHTML=photoList.length
    ?'<img src="'+photoList[0]+'" alt="'+p.name+'">'
    :'<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="opacity:0.3"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><span style="font-size:11px;font-weight:500;">No photos submitted</span>';
  document.getElementById('popup-overlay').classList.add('open');
}

document.getElementById('popup-close-btn').addEventListener('click',function(){
  document.getElementById('popup-overlay').classList.remove('open');
});
document.getElementById('popup-overlay').addEventListener('click',function(e){
  if(e.target===this) this.classList.remove('open');
});

document.getElementById('type-filters').addEventListener('click',function(e){
  var chip=e.target.closest('.chip');
  if(!chip) return;
  document.querySelectorAll('.chip[data-type]').forEach(function(c){c.classList.remove('active');});
  chip.classList.add('active');
  activeType=chip.dataset.type;
  applyFilters();
});

document.getElementById('year-range').addEventListener('input',function(){
  activeYear=parseInt(this.value);
  document.getElementById('year-display').textContent=activeYear===1875?'All Years':'Since '+activeYear;
  applyFilters();
});

function applyFilters(){
  var filtered=allProjects.filter(function(p){
    var tm=activeType==='all'||p.type===activeType;
    var ym=activeYear===1875||(!isNaN(parseInt(p.year))&&parseInt(p.year)>=activeYear);
    return tm&&ym;
  });
  renderMarkers(filtered);
}

var s=document.createElement('script');
s.src='https://maps.googleapis.com/maps/api/js?key='+MAPS_KEY+'&callback=initMap&loading=async';
s.async=true;s.defer=true;
document.head.appendChild(s);
})();
</script>
</body>
</html>
