<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFE Heritage Map — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1B2A4A;--navy-mid:#243558;--white:#FFFFFF;--off-white:#F7F8FA;
  --light:#ECEEF2;--border:rgba(27,42,74,0.1);--text:#1B2A4A;--muted:#6B7A99;
  --green:#4BC88A;--cyan:#3BBFCE;--blue:#4B7BEC;--purple:#7B5EA7;
  --error:#E3001B;--warn:#F4A623;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Poppins,sans-serif;background:var(--off-white);color:var(--text);min-height:100vh;}
#app{display:none;min-height:100vh;flex-direction:row;}
#app.visible{display:flex;}

#sidebar{
  width:220px;min-height:100vh;background:var(--navy);
  display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;
}
.sidebar-logo{padding:22px 20px;border-bottom:1px solid rgba(255,255,255,0.08);}
.sidebar-logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:0;}
.sidebar-hex{width:30px;height:30px;flex-shrink:0;}
.sidebar-name{font-size:17px;font-weight:800;color:var(--white);letter-spacing:-0.5px;}
.sidebar-tag{font-size:8px;font-weight:500;color:rgba(255,255,255,0.35);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;}
.sidebar-section{font-size:9px;font-weight:600;color:rgba(255,255,255,0.4);letter-spacing:1.5px;text-transform:uppercase;margin-top:10px;}

.sidebar-nav{padding:14px 0;flex:1;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;
  font-size:11px;font-weight:600;letter-spacing:0.5px;color:rgba(255,255,255,0.5);
  text-transform:uppercase;border-left:2px solid transparent;transition:all 0.15s;
}
.nav-item:hover{color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.04);}
.nav-item.active{color:var(--white);border-left-color:var(--green);background:rgba(75,200,138,0.08);}
.badge{margin-left:auto;background:var(--green);color:var(--navy);font-size:10px;padding:2px 7px;font-weight:800;border-radius:2px;}

.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.08);}
.sidebar-footer a{font-size:10px;color:rgba(255,255,255,0.4);text-decoration:none;letter-spacing:0.5px;display:block;margin-bottom:8px;transition:color 0.15s;font-weight:500;}
.sidebar-footer a:hover{color:rgba(255,255,255,0.8);}
.sidebar-footer a.danger{color:rgba(227,0,27,0.5);}
.sidebar-footer a.danger:hover{color:var(--error);}

#main{margin-left:220px;flex:1;min-height:100vh;}
#topbar{
  height:54px;background:var(--white);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 28px;
  position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(27,42,74,0.05);
}
.topbar-title{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.btn-refresh{
  background:transparent;border:1.5px solid var(--border);color:var(--muted);
  padding:6px 14px;font-size:10px;font-weight:700;letter-spacing:0.5px;
  cursor:pointer;font-family:Poppins,sans-serif;text-transform:uppercase;transition:all 0.15s;
}
.btn-refresh:hover{border-color:var(--navy);color:var(--navy);}

#content{padding:24px 28px;}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--navy);flex-direction:column;gap:0;}
.login-box{background:var(--white);padding:44px;width:100%;max-width:380px;box-shadow:0 32px 80px rgba(0,0,0,0.3);}
.login-logo-wrap{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.login-hex{width:40px;height:40px;}
.login-logo-name{font-size:28px;font-weight:800;color:var(--navy);letter-spacing:-1px;}
.login-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-bottom:32px;}
.login-field{margin-bottom:16px;}
.login-field label{display:block;font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:6px;}
.login-field input{width:100%;background:var(--off-white);border:1.5px solid var(--border);color:var(--text);padding:12px 14px;font-family:Poppins,sans-serif;font-size:14px;outline:none;}
.login-field input:focus{border-color:var(--navy);background:var(--white);}
.btn-login{width:100%;background:var(--navy);color:var(--white);border:none;padding:13px;font-family:Poppins,sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;margin-top:8px;transition:background 0.2s;}
.btn-login:hover{background:var(--navy-mid);}
.login-error{color:var(--error);font-size:12px;text-align:center;margin-top:12px;display:none;font-weight:500;}
.login-hint{font-size:11px;color:rgba(255,255,255,0.25);letter-spacing:0.5px;margin-top:20px;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:var(--white);border:1px solid var(--border);padding:20px 22px;}
.stat-card-label{font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:10px;}
.stat-card-num{font-size:36px;font-weight:800;color:var(--navy);letter-spacing:-1px;}
.stat-card-sub{font-size:11px;color:var(--muted);margin-top:4px;font-weight:400;}

/* TABLE */
.table-wrap{background:var(--white);border:1px solid var(--border);}
.table-top{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border);}
.table-title{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;color:var(--navy);}
.projects-table{width:100%;border-collapse:collapse;}
.projects-table th{font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);font-weight:700;background:var(--off-white);}
.projects-table td{padding:13px 14px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;}
.projects-table tr:last-child td{border-bottom:none;}
.projects-table tr:hover td{background:var(--off-white);}
.project-name{font-weight:600;font-size:13px;color:var(--navy);}
.project-sub{font-size:11px;color:var(--muted);margin-top:2px;font-weight:400;}

.status-badge{display:inline-flex;align-items:center;font-size:9px;padding:3px 10px;letter-spacing:0.5px;text-transform:uppercase;font-weight:700;border-radius:2px;}
.status-pending{background:rgba(244,166,35,0.12);color:var(--warn);}
.status-approved{background:rgba(75,200,138,0.12);color:#2A9D6E;}
.status-rejected{background:rgba(227,0,27,0.08);color:var(--error);}

.action-btns{display:flex;gap:5px;}
.btn-view{background:transparent;border:1.5px solid var(--border);color:var(--muted);padding:5px 11px;font-size:10px;font-weight:600;cursor:pointer;font-family:Poppins,sans-serif;transition:all 0.15s;text-transform:uppercase;}
.btn-view:hover{border-color:var(--navy);color:var(--navy);}
.btn-approve{background:rgba(75,200,138,0.1);border:1.5px solid rgba(75,200,138,0.3);color:#2A9D6E;padding:5px 11px;font-size:10px;font-weight:700;cursor:pointer;font-family:Poppins,sans-serif;transition:all 0.15s;text-transform:uppercase;}
.btn-approve:hover{background:var(--green);color:var(--white);border-color:var(--green);}
.btn-reject{background:rgba(227,0,27,0.06);border:1.5px solid rgba(227,0,27,0.2);color:var(--error);padding:5px 11px;font-size:10px;font-weight:700;cursor:pointer;font-family:Poppins,sans-serif;transition:all 0.15s;text-transform:uppercase;}
.btn-reject:hover{background:var(--error);color:white;border-color:var(--error);}
.btn-delete{background:transparent;border:1.5px solid rgba(227,0,27,0.15);color:rgba(227,0,27,0.4);padding:5px 9px;font-size:10px;cursor:pointer;font-family:Poppins,sans-serif;transition:all 0.15s;}
.btn-delete:hover{background:var(--error);color:white;border-color:var(--error);}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:13px;}

/* DETAIL MODAL */
#detail-overlay{position:fixed;inset:0;background:rgba(27,42,74,0.5);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
#detail-overlay.open{display:flex;}
#detail-modal{background:var(--white);width:640px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:0 32px 80px rgba(27,42,74,0.25);}
.detail-header{padding:22px 28px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;}
.detail-title{font-size:22px;font-weight:800;color:var(--navy);letter-spacing:-0.3px;}
.detail-close{background:transparent;border:1.5px solid var(--border);color:var(--muted);width:32px;height:32px;cursor:pointer;font-size:14px;transition:all 0.15s;flex-shrink:0;}
.detail-close:hover{background:var(--navy);color:var(--white);border-color:var(--navy);}
.detail-body{padding:24px 28px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px;}
.detail-field label{font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;font-weight:700;display:block;margin-bottom:4px;}
.detail-field p{font-size:13px;color:var(--navy);font-weight:400;}
.detail-photos{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.detail-photos img{width:120px;height:90px;object-fit:cover;border:1px solid var(--border);}
.detail-actions{display:flex;gap:10px;margin-top:22px;padding-top:18px;border-top:1px solid var(--border);}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--navy);color:var(--white);padding:13px 20px;font-size:12px;font-weight:600;transform:translateY(100px);opacity:0;transition:all 0.3s;border-left:3px solid var(--green);}
.toast.show{transform:translateY(0);opacity:1;}
.toast.error{border-left-color:var(--error);}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo-wrap">
      <img src="https://companieslogo.com/img/orig/CFEB.BR_BIG.D-d0bf4cce.png?t=1721672046" alt="CFE" style="height:36px;width:auto;">
    </div>
    <div class="login-sub">Heritage Map &middot; Admin</div>
    <div class="login-field"><label>Email</label><input type="email" id="login-email" placeholder="Enter admin email"></div>
    <div class="login-field"><label>Password</label><input type="password" id="login-pass" placeholder="Enter password"></div>
    <button class="btn-login" id="login-btn">Sign In</button>
    <div class="login-error" id="login-error">Invalid credentials. Please try again.</div>
  </div>
  <p class="login-hint" id="login-hint"></p>
</div>

<div id="app">
  <div id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-wrap">
        <img src="https://companieslogo.com/img/orig/CFEB.BR_BIG.D-d0bf4cce.png?t=1721672046" alt="CFE" style="height:28px;width:auto;">
      </div>
      <div class="sidebar-section">Heritage Map Admin</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-item active" data-view="pending">&#9203; Pending <span class="badge" id="pending-badge">0</span></div>
      <div class="nav-item" data-view="all">&#9776; All Projects</div>
      <div class="nav-item" data-view="approved">&#10003; Approved</div>
      <div class="nav-item" data-view="rejected">&#10005; Rejected</div>
      <div class="nav-item" data-view="stats">&#9632; Statistics</div>
    </div>
    <div class="sidebar-footer">
      <a href="cfe-map.html" target="_blank">&#8599; View Public Map</a>
      <a href="cfe-submit.html" target="_blank">&#8599; Submission Form</a>
      <a href="#" id="logout-link" class="danger">&#8592; Sign Out</a>
    </div>
  </div>

  <div id="main">
    <div id="topbar">
      <div class="topbar-title" id="view-title">Pending Submissions</div>
      <div style="display:flex;align-items:center;gap:14px;">
        <button class="btn-refresh" id="refresh-btn">&#8635; Refresh</button>
        <span style="font-size:11px;color:var(--muted);font-weight:500;" id="topbar-user"></span>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>

<div id="detail-overlay">
  <div id="detail-modal">
    <div class="detail-header">
      <div><div class="detail-title" id="dm-name"></div><div style="margin-top:6px;" id="dm-badge"></div></div>
      <button class="detail-close" id="detail-close-btn">&#10005;</button>
    </div>
    <div class="detail-body">
      <div class="detail-grid">
        <div class="detail-field"><label>Year Delivered</label><p id="dm-year"></p></div>
        <div class="detail-field"><label>Type of Works</label><p id="dm-type"></p></div>
        <div class="detail-field"><label>Submitted By</label><p id="dm-submitter"></p></div>
        <div class="detail-field"><label>Email</label><p id="dm-email"></p></div>
        <div class="detail-field"><label>Company</label><p id="dm-company"></p></div>
        <div class="detail-field"><label>Country</label><p id="dm-country"></p></div>
        <div class="detail-field"><label>Location</label><p id="dm-location"></p></div>
        <div class="detail-field"><label>Coordinates</label><p id="dm-coords"></p></div>
      </div>
      <div class="detail-field" style="margin-bottom:16px;"><label>Works Description</label><p id="dm-works" style="line-height:1.7;color:var(--muted);margin-top:4px;font-size:13px;"></p></div>
      <div class="detail-field"><label>Submitted Photos</label><div class="detail-photos" id="dm-photos"></div></div>
      <div class="detail-actions" id="dm-actions"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';
var SCRIPT_URL     = 'https://script.google.com/macros/s/AKfycby9iTkjOeH0Zl1ETbdMBPTm0k4cfAbw7JI4OCA3LxlxzvZgag9jo1e5oIV_swt0G_GNWQ/exec';
var ADMIN_EMAIL    = ['admin','cfe.be'].join('@');
var ADMIN_PASSWORD = 'CFEheritage2025';

var currentView='pending', projects=[];

document.getElementById('login-hint').textContent='Login: '+ADMIN_EMAIL+' / CFEheritage2025';

function doLogin(){
  var e=document.getElementById('login-email').value.trim();
  var p=document.getElementById('login-pass').value;
  if(e===ADMIN_EMAIL&&p===ADMIN_PASSWORD){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('topbar-user').textContent=e;
    loadProjects();
  } else {
    document.getElementById('login-error').style.display='block';
  }
}

document.getElementById('login-btn').addEventListener('click',doLogin);
document.getElementById('login-email').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
document.getElementById('login-pass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
document.getElementById('logout-link').addEventListener('click',function(e){
  e.preventDefault();
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').classList.remove('visible');
});

var TITLES={pending:'Pending Submissions',all:'All Projects',approved:'Approved Projects',rejected:'Rejected Projects',stats:'Statistics'};
document.querySelector('.sidebar-nav').addEventListener('click',function(e){
  var item=e.target.closest('.nav-item');if(!item) return;
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
  item.classList.add('active');
  currentView=item.dataset.view;
  document.getElementById('view-title').textContent=TITLES[currentView]||'';
  renderView();
});

document.getElementById('refresh-btn').addEventListener('click',loadProjects);

function loadProjects(){
  var cb='_cfe'+Date.now();
  var script=document.createElement('script');
  var timer=setTimeout(function(){cleanup();projects=DEMO;updateBadge();renderView();},8000);
  window[cb]=function(data){cleanup();projects=(data&&data.projects)?data.projects:DEMO;updateBadge();renderView();};
  function cleanup(){clearTimeout(timer);delete window[cb];if(script.parentNode)script.parentNode.removeChild(script);}
  script.onerror=function(){cleanup();projects=DEMO;updateBadge();renderView();};
  script.src=SCRIPT_URL+'?action=list&callback='+cb;
  document.head.appendChild(script);
}

function updateBadge(){
  document.getElementById('pending-badge').textContent=projects.filter(function(p){return p.status==='pending';}).length;
}

function renderView(){
  if(currentView==='stats'){renderStats();return;}
  var list=currentView==='all'?projects:projects.filter(function(p){return p.status===currentView;});
  renderTable(list);
}

function renderStats(){
  var total=projects.length,approved=projects.filter(function(p){return p.status==='approved';}).length;
  var pending=projects.filter(function(p){return p.status==='pending';}).length;
  var countries=new Set(projects.map(function(p){return p.country;}).filter(Boolean)).size;
  var types={};projects.forEach(function(p){if(p.type)types[p.type]=(types[p.type]||0)+1;});
  var max=Math.max.apply(null,Object.values(types).concat([1]));
  var bars=Object.entries(types).sort(function(a,b){return b[1]-a[1];}).map(function(t){
    return '<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">'
      +'<div style="font-size:12px;width:180px;font-weight:500;">'+t[0]+'</div>'
      +'<div style="flex:1;height:6px;background:var(--light);"><div style="height:100%;background:var(--navy);width:'+Math.round(t[1]/max*100)+'%"></div></div>'
      +'<div style="font-size:12px;font-weight:700;color:var(--navy);width:30px;text-align:right;">'+t[1]+'</div></div>';
  }).join('');
  document.getElementById('content').innerHTML=
    '<div class="stats-grid">'
    +'<div class="stat-card"><div class="stat-card-label">Total Submissions</div><div class="stat-card-num">'+total+'</div></div>'
    +'<div class="stat-card"><div class="stat-card-label">Approved</div><div class="stat-card-num" style="color:#2A9D6E">'+approved+'</div></div>'
    +'<div class="stat-card"><div class="stat-card-label">Pending Review</div><div class="stat-card-num" style="color:var(--warn)">'+pending+'</div></div>'
    +'<div class="stat-card"><div class="stat-card-label">Countries</div><div class="stat-card-num">'+countries+'</div></div>'
    +'</div><div class="table-wrap"><div class="table-top"><div class="table-title">Projects by Type</div></div><div style="padding:20px 18px;">'+bars+'</div></div>';
}

function renderTable(list){
  if(!list.length){document.getElementById('content').innerHTML='<div class="empty-state">No projects in this category.</div>';return;}
  var rows=list.map(function(p){
    var idx=projects.indexOf(p);
    var date=p.submitted_at?new Date(p.submitted_at).toLocaleDateString():'N/A';
    return '<tr>'
      +'<td><div class="project-name">'+esc(p.name||'')+'</div><div class="project-sub">'+date+'</div></td>'
      +'<td style="font-size:11px;font-weight:500;">'+esc(p.type||'—')+'</td>'
      +'<td style="font-weight:600;">'+esc(p.year||'—')+'</td>'
      +'<td style="font-size:11px;color:var(--muted);">'+esc(p.location_name||'—')+'</td>'
      +'<td><div style="font-size:12px;font-weight:500;">'+esc(p.name_contact||'—')+'</div><div style="font-size:11px;color:var(--muted);">'+esc(p.company||'')+'</div></td>'
      +'<td><span class="status-badge status-'+(p.status||'pending')+'">'+(p.status||'pending')+'</span></td>'
      +'<td><div class="action-btns">'
      +'<button class="btn-view" data-action="view" data-idx="'+idx+'">View</button>'
      +(p.status!=='approved'?'<button class="btn-approve" data-action="approve" data-idx="'+idx+'">&#10003;</button>':'')
      +(p.status!=='rejected'?'<button class="btn-reject" data-action="reject" data-idx="'+idx+'">&#10005;</button>':'')
      +'<button class="btn-delete" data-action="delete" data-idx="'+idx+'">&#128465;</button>'
      +'</div></td></tr>';
  }).join('');
  document.getElementById('content').innerHTML=
    '<div class="table-wrap"><div class="table-top"><div class="table-title">'+list.length+' project'+(list.length!==1?'s':'')+'</div></div>'
    +'<div style="overflow:auto;"><table class="projects-table"><thead><tr>'
    +'<th>Project</th><th>Type</th><th>Year</th><th>Location</th><th>Submitted By</th><th>Status</th><th>Actions</th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

document.getElementById('main').addEventListener('click',function(e){
  var btn=e.target?e.target.closest('[data-action]'):null;
  if(!btn||!btn.dataset) return;
  var idx=parseInt(btn.dataset.idx,10);if(isNaN(idx)) return;
  var action=btn.dataset.action;
  if(action==='view') openDetail(idx);
  if(action==='approve') updateStatus(idx,'approved');
  if(action==='reject')  updateStatus(idx,'rejected');
  if(action==='delete')  deleteProject(idx);
});

function openDetail(idx){
  var p=projects[idx];
  document.getElementById('dm-name').textContent=p.name||'';
  document.getElementById('dm-badge').innerHTML='<span class="status-badge status-'+(p.status||'pending')+'">'+(p.status||'pending')+'</span>';
  document.getElementById('dm-year').textContent=p.year||'—';
  document.getElementById('dm-type').textContent=p.type||'—';
  document.getElementById('dm-submitter').textContent=p.name_contact||'—';
  document.getElementById('dm-email').textContent=p.email||'—';
  document.getElementById('dm-company').textContent=p.company||'—';
  document.getElementById('dm-country').textContent=p.country||'—';
  document.getElementById('dm-location').textContent=p.location_name||'—';
  document.getElementById('dm-coords').textContent=(p.lat&&p.lng)?p.lat+', '+p.lng:'—';
  document.getElementById('dm-works').textContent=p.works||'No description provided.';
  var photoList=p.photos?(Array.isArray(p.photos)?p.photos:p.photos.split('|').filter(Boolean)):[];
  document.getElementById('dm-photos').innerHTML=photoList.length
    ?photoList.map(function(s){return '<img src="'+s+'" alt="photo">';}).join('')
    :'<span style="font-size:12px;color:var(--muted);">No photos submitted</span>';
  var act=document.getElementById('dm-actions');act.innerHTML='';
  function makeBtn(cls,txt,fn){var b=document.createElement('button');b.className=cls;b.style.padding='10px 20px';b.style.fontSize='11px';b.textContent=txt;b.addEventListener('click',fn);act.appendChild(b);}
  if(p.status!=='approved') makeBtn('btn-approve','&#10003; Approve & Publish',function(){updateStatus(idx,'approved');closeDetail();});
  if(p.status!=='rejected') makeBtn('btn-reject','&#10005; Reject',function(){updateStatus(idx,'rejected');closeDetail();});
  makeBtn('btn-delete','&#128465; Delete',function(){deleteProject(idx);closeDetail();});
  document.getElementById('detail-overlay').classList.add('open');
}

document.getElementById('detail-close-btn').addEventListener('click',closeDetail);
document.getElementById('detail-overlay').addEventListener('click',function(e){if(e.target===this)closeDetail();});
function closeDetail(){document.getElementById('detail-overlay').classList.remove('open');}

function updateStatus(idx,status){
  projects[idx].status=status;
  fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:'payload='+encodeURIComponent(JSON.stringify({action:'updateStatus',id:projects[idx].id,status:status}))}).catch(function(){});
  toast(status==='approved'?'&#10003; Project approved and live on map':'&#10005; Project rejected',status==='approved'?'':'error');
  updateBadge();renderView();
}

function deleteProject(idx){
  if(!confirm('Delete this project permanently?')) return;
  var id=projects[idx].id;projects.splice(idx,1);
  fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:'payload='+encodeURIComponent(JSON.stringify({action:'delete',id:id}))}).catch(function(){});
  toast('Project deleted');updateBadge();renderView();
}

function toast(msg,type){
  var t=document.getElementById('toast');
  t.innerHTML=msg;t.className='toast '+(type||'')+' show';
  setTimeout(function(){t.classList.remove('show');},3000);
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
